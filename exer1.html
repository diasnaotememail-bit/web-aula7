<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exer1</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('btn_calcular');
            botao.addEventListener('click', calculo);
        }

        function calculo() {
            let saida = document.getElementById('resultado');
            saida.innerHTML = calcula_area(5);
        }

       /* function calcula_circunferencia(raio) {
            let circunferencia = 2 * raio * Math.PI;
            return circunferencia;
        }*/

        function calcula_area(raio){
            let area = Math.PI * (raio * raio)
            return area;
        }

    </script>
</head>

<body>
    <h1>Aperte o botão</h1>
    <p id="resultado">Resultado...</p>
    <button id="btn_calcular">Calcular</button>
</body>

</html>
